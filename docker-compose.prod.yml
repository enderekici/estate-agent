services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: estate-agent-ts
    hostname: estate-agent
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_ACCEPT_DNS=false
      - TS_EXTRA_ARGS=--reset --exit-node=100.110.80.103 --exit-node-allow-lan-access
    volumes:
      - ts-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    privileged: true
    ports:
      - "3000:3000"
    restart: unless-stopped

  app:
    image: ghcr.io/enderekici/estate-agent:${IMAGE_TAG:-main}
    env_file: .env
    volumes:
      - ./data:/app/data
    network_mode: "service:tailscale"
    depends_on:
      - tailscale
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/config').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  ts-state:
